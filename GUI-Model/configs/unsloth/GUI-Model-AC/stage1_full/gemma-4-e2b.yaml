### model
model_name_or_path: google/gemma-4-E2B-it
max_seq_length: 16384
load_in_4bit: false

### method
stage: sft
do_train: true
finetuning_type: full
full_finetuning: true
freeze_vision_tower: true

### dataset
dataset_path: data/AndroidControl/gui-model_stage1_train.jsonl
image_base_dir: data/AndroidControl
template: gemma4
cutoff_len: 16384

### output
output_dir: LlamaFactory/saves/gemma-4-e2b/AC/stage1_full/full_world_model
logging_steps: 1
save_strategy: epoch
save_total_limit: 5
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: unsloth
ddp_find_unused_parameters: false
seed: 3407
