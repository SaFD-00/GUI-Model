### model
# Stage 1 merged model (SaFD-00/... or local ./LlamaFactory/outputs/... path)
model_name_or_path: SaFD-00/gemma-4-e4b-mb-stage1-world-model
max_seq_length: 16384
load_in_4bit: false

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true

### lora
lora_rank: 16
lora_alpha: 32
lora_target: all
lora_dropout: 0.1

### dataset
dataset_path: data/MobiBench/gui-model_stage2_train.jsonl
image_base_dir: data/MobiBench
template: gemma4
cutoff_len: 16384

### output
output_dir: LlamaFactory/saves/gemma-4-e4b/MB/stage2_lora/lora_world_model
logging_steps: 1
save_strategy: epoch
save_total_limit: 5
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 3.0e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: unsloth
ddp_find_unused_parameters: false
seed: 3407
